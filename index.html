<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo-transparent-colour.png"/>
    <title>Capture A Storm Photography</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            color: #99aaf4;
            background-color: #f8f8f8;
            scroll-behavior: smooth;
        }

        .container {
            max-width: 2400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            background: linear-gradient(135deg,#2c3e50, #34495e);
            color: white;
            padding: 1rem 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-width: 100%;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(45deg, #cbc2ed, #adbce1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
            filter: invert();
        }

        .hamburger {
            display: flex;
            flex-direction: column;
            cursor: pointer;
            padding: 10px;
            z-index: 1001;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background-color: white;
            margin: 3px 0;
            transition: 0.3s;
            border-radius: 2px;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(-45deg) translate(-5px, 6px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(45deg) translate(-5px, -6px);
        }

        .nav-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 300px;
            height: 100vh;
            background: linear-gradient(135deg, #2c3e50bb, #34495ebb);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: right 0.3s ease;
            z-index: 1000;
        }

        .nav-menu.active {
            right: 0;
        }

        .nav-menu a {
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 500;
            margin: 1rem 0;
            padding: 1rem 2rem;
            border-radius: 25px;
            transition: all 0.3s ease;
            width: 80%;
            text-align: center;
        }

        .nav-menu a:hover {
            background: rgba(255,255,255,0.1);
            transform: translateX(-5px);
        }

        .nav-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0,0,0,0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 999;
        }

        .nav-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .page {
            display: none;
            min-height: 100vh;
            padding-top: 80px;
        }

        .page.active {
            display: block;
        }

        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
                        url('https://www.dropbox.com/scl/fi/228sve25135t1tsue05vh/IMG_4785-2.jpg?rlkey=00tqfpqnblbongbqrzax44cf1&st=xgvxhz78&raw=1') no-repeat center center;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            margin-top: -80px;
        }

        .hero-content h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: fadeInUp 1s ease;
        }

        .hero-content p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            animation: fadeInUp 1s ease 0.3s both;
        }

        .cta-button {
            display: inline-block;
            background: linear-gradient(45deg, #e74c3c, #f39c12);
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
            animation: fadeInUp 1s ease 0.6s both;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.3);
        }

        .page-header {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            padding: 4rem 0 2rem;
            text-align: center;
        }

        .page-header h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .page-header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        section {
            padding: 80px 0;
        }

        h2 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 3rem;
            background: linear-gradient(45deg, #2c3e50, #34495e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 2rem;
        }

        /* Masonry layout for portfolio — handles mixed portrait/landscape cleanly */
        .gallery-grid.masonry {
            display: block;
            columns: 3;
            column-gap: 15px;
        }

        .gallery-grid.masonry .gallery-item {
            break-inside: avoid;
            margin-bottom: 15px;
            display: block;
        }

        .gallery-grid.masonry .gallery-item img {
            height: auto;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            align-content: center;
        }

        .gallery-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            object-fit: scale-down;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(231, 76, 60, 0.8), rgba(243, 156, 18, 0.8));
            opacity: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease;
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }

        .gallery-overlay h3 {
            color: white;
            font-size: 1.5rem;
            text-align: center;
        }

        .packages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .package-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .package-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(45deg, #e74c3c, #f39c12);
        }

        .package-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.15);
        }

        .package-card h3 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: #2c3e50;
        }

        .price {
            font-size: 2.5rem;
            font-weight: bold;
            color: #e74c3c;
            margin-bottom: 1rem;
        }

        .package-features {
            list-style: none;
            margin-bottom: 2rem;
        }

        .package-features li {
            padding: 0.5rem 0;
            border-bottom: 1px solid #eee;
        }

        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .review-card {
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .review-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(45deg, #e74c3c, #f39c12);
        }

        .review-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.15);
        }

        .stars {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            color: #f39c12;
        }

        .review-text {
            font-style: italic;
            font-size: 1.1rem;
            line-height: 1.8;
            color: #666;
            margin-bottom: 2rem;
            text-align: center;
        }

        .reviewer-info {
            text-align: center;
            border-top: 1px solid #eee;
            padding-top: 1.5rem;
        }

        .reviewer-name {
            font-weight: bold;
            font-size: 1.2rem;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }

        .review-session {
            color: #e74c3c;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .contact-section {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
        }

        .contact-form {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            padding: 2rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.9);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.3);
            transform: translateY(-2px);
        }

        .submit-btn {
            background: linear-gradient(45deg, #e74c3c, #f39c12);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.3);
        }

        footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 2rem 0;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 90%;
            max-height: 90%;
        }

        .modal img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            object-fit: scale-down;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close:hover {
            color: #f39c12;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 768px) {
            .hero-content h1 {
                font-size: 2.5rem;
            }

            .page-header h1 {
                font-size: 2rem;
            }

            .gallery-grid {
                grid-template-columns: 1fr;
            }

            .gallery-grid.masonry {
                columns: 2;
            }

            h2 {
                font-size: 2rem;
            }

            .nav-menu {
                width: 100%;
            }
        }

        .description-text {
            max-width: 800px;
            margin: 0 auto 3rem;
            text-align: center;
            font-size: 1.1rem;
            line-height: 1.8;
            color: #666;
        }

        /* Portfolio items — no colour overlay, zoom cursor on hover */
        .portfolio-item {
            cursor: zoom-in;
        }

        .portfolio-item:hover {
            transform: none;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        /* Portfolio skeleton loading */
        @keyframes shimmer {
            0%   { background-position: -600px 0; }
            100% { background-position:  600px 0; }
        }

        .skeleton {
            border-radius: 15px;
            background: linear-gradient(90deg, #e8e8e8 25%, #f5f5f5 50%, #e8e8e8 75%);
            background-size: 600px 100%;
            animation: shimmer 1.4s infinite linear;
            break-inside: avoid;
            margin-bottom: 15px;
        }

        /* Fade in images as they load */
        .gallery-grid.masonry .gallery-item img {
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .gallery-grid.masonry .gallery-item img.loaded {
            opacity: 1;
        }
    </style>
</head>
<body>
    <header>
        <nav class="container">
            <img src="https://www.dropbox.com/scl/fi/3ajvk35m9zs3nunocioma/FF9118F1-7D0C-4186-8DBC-587B1364310B.png?rlkey=kyb16dbk8yhj1ikxwx1gh9xyd&st=4avmsaxu&raw=1" alt="Logo" class="logo" onclick="showPage('Home')" height="75">
            <div class="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <div class="nav-overlay" onclick="closeMenu()"></div>
    <div class="nav-menu">
        <a href="#" onclick="showPage('Home')">Home</a>
        <a href="#" onclick="showPage('Maternity')">Maternity</a>
        <a href="#" onclick="showPage('Adults')">Aerial & Sports</a>
        <a href="#" onclick="showPage('Kids')">Children</a>
        <a href="#" onclick="showPage('Pets')">Pets</a>
        <a href="#" onclick="showPage('Portfolio')">Portfolio</a>
        <a href="#" onclick="showPage('Packages')">Packages</a>
        <a href="#" onclick="showPage('Reviews')">Reviews</a>
        <a href="#" onclick="showPage('Contact')">Contact</a>
    </div>

    <div id="Home"      class="page active"></div>
    <div id="Maternity" class="page"></div>
    <div id="Adults"    class="page"></div>
    <div id="Kids"      class="page"></div>
    <div id="Pets"      class="page"></div>
    <div id="Portfolio" class="page"></div>
    <div id="Packages"  class="page"></div>
    <div id="Reviews"   class="page"></div>
    <div id="Contact"   class="page"></div>

    <footer>
        <div class="container">
            <p>&copy; 2026 Capture A Storm Photography. All rights reserved.</p>
            <p>Creating beautiful memories, one shot at a time.</p>
        </div>
    </footer>

    <!-- Modal for enlarged images -->
    <div id="imageModal" class="modal">
        <span class="close" onclick="closeModal()">&times;</span>
        <div class="modal-content">
            <img id="modalImage" src="" alt="">
        </div>
    </div>

    <script>
        let currentPage = 'Home';
        let portfolioLoaded = false;

        const observer = new IntersectionObserver(function(entries) {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

        // Load a page's HTML from pages/ and inject it
        async function loadPage(pageId) {
            const container = document.getElementById(pageId);
            const res = await fetch(`pages/${pageId.toLowerCase()}.html`);
            container.innerHTML = await res.text();

            // Wire up scroll animations for newly added items
            container.querySelectorAll('.gallery-item, .package-card').forEach(el => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(30px)';
                el.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
                observer.observe(el);
            });

            // Attach contact form handler once the form exists in the DOM
            if (pageId === 'Contact') {
                document.getElementById('contactForm').addEventListener('submit', function(e) {
                    e.preventDefault();
                    const data = Object.fromEntries(new FormData(this));
                    const subject = encodeURIComponent(`Photography Inquiry - ${data['session-type'] || 'General'}`);
                    const body = encodeURIComponent(`Name: ${data.name}\nEmail: ${data.email}\nPhone: ${data.phone || 'Not provided'}\nSession Type: ${data['session-type'] || 'Not specified'}\nPackage Type: ${data['package-type'] || 'Not specified'}\n\nMessage:\n${data.message}`);
                    window.location.href = `mailto:captureastorm@gmail.com?subject=${subject}&body=${body}`;
                    alert('Thank you for your inquiry! Your email client will open to send the message.');
                });
            }
        }

        // Fetch all pages in parallel on load so navigation is instant
        const pages = ['Home', 'Maternity', 'Adults', 'Kids', 'Pets', 'Portfolio', 'Packages', 'Reviews', 'Contact'];
        Promise.all(pages.map(loadPage)).then(() => {
            // After all pages loaded, navigate to hash if present
            const hash = window.location.hash.substring(1);
            if (hash && document.getElementById(hash)) showPage(hash);
        });

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            currentPage = pageId;
            closeMenu();
            window.scrollTo(0, 0);
            window.location.hash = pageId;
            if (pageId === 'Portfolio') loadPortfolioImages();
        }

        async function loadPortfolioImages() {
            if (portfolioLoaded) return;
            const grid = document.getElementById('portfolio-grid');
            try {
                const res = await fetch('portfolio.json');
                if (!res.ok) throw new Error('Failed to load portfolio.json');
                const urls = await res.json();

                if (!urls.length) {
                    grid.innerHTML = '<p style="text-align:center;padding:2rem;color:#666;">No images found.</p>';
                    return;
                }

                // Render skeletons upfront — each stores its URL in a data attribute
                grid.innerHTML = '';
                const skeletonHeights = [260, 340, 220, 300, 280, 250, 320, 240, 360, 270];
                urls.forEach((url, i) => {
                    const skel = document.createElement('div');
                    skel.className = 'skeleton';
                    skel.style.height = skeletonHeights[i % skeletonHeights.length] + 'px';
                    skel.dataset.src = url;
                    grid.appendChild(skel);
                });

                // Replace each skeleton with its image only when it scrolls into view
                const lazyLoader = new IntersectionObserver((entries, obs) => {
                    entries.forEach(entry => {
                        if (!entry.isIntersecting) return;
                        const skel = entry.target;
                        obs.unobserve(skel);
                        const img = new Image();
                        img.onload = () => {
                            const item = document.createElement('div');
                            item.className = 'gallery-item portfolio-item';
                            item.onclick = function() { openModal(this); };
                            item.innerHTML = `<img src="${skel.dataset.src}" class="loaded">`;
                            item.style.opacity = '0';
                            item.style.transform = 'translateY(20px)';
                            item.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                            skel.replaceWith(item);
                            observer.observe(item);
                        };
                        img.src = skel.dataset.src;
                    });
                }, { rootMargin: '200px' });

                grid.querySelectorAll('.skeleton').forEach(skel => lazyLoader.observe(skel));

                portfolioLoaded = true;
            } catch (err) {
                grid.innerHTML = `<p style="text-align:center;padding:2rem;color:#e74c3c;">Could not load portfolio images. Please try again later.</p>`;
                console.error('Portfolio load error:', err);
            }
        }

        function toggleMenu() {
            document.querySelector('.hamburger').classList.toggle('active');
            document.querySelector('.nav-menu').classList.toggle('active');
            document.querySelector('.nav-overlay').classList.toggle('active');
        }

        function closeMenu() {
            document.querySelector('.hamburger').classList.remove('active');
            document.querySelector('.nav-menu').classList.remove('active');
            document.querySelector('.nav-overlay').classList.remove('active');
        }

        function openModal(element) {
            const img = element.querySelector('img');
            document.getElementById('modalImage').src = img.src;
            document.getElementById('modalImage').alt = img.alt;
            document.getElementById('imageModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        document.getElementById('imageModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        window.addEventListener('hashchange', function() {
            const hash = window.location.hash.substring(1);
            if (hash && document.getElementById(hash)) showPage(hash);
        });

        window.addEventListener('scroll', function() {
            const header = document.querySelector('header');
            if (window.scrollY > 100) {
                header.style.background = 'rgba(44, 62, 80, 0.95)';
                header.style.backdropFilter = 'blur(10px)';
            } else {
                header.style.background = 'linear-gradient(135deg, #2c3e50, #34495e)';
                header.style.backdropFilter = 'none';
            }
        });
    </script>
</body>
</html>
