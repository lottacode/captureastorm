<div class="page-header">
    <div class="container">
        <h1>Get In Touch</h1>
        <p>Ready to capture your special moments? Let's create something beautiful together</p>
    </div>
</div>

<section class="contact-section">
    <div class="container">
        <div class="contact-form">
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" name="phone">
                </div>
                <div class="form-group">
                    <label for="session-type">Session Type</label>
                    <select id="session-type" name="session-type">
                        <option value="">Select a session type</option>
                        <option value="maternity">Maternity</option>
                        <option value="children">Children</option>
                        <option value="pets">Pets</option>
                        <option value="portraits">Portraits</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="package-type">Package</label>
                    <select id="package-type" name="package-type">
                        <option value="">Select a package type</option>
                        <option value="essential">Essential</option>
                        <option value="premium">Premium</option>
                        <option value="deluxe">Deluxe</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Tell me about your vision for the session..."></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </div>
</section>
